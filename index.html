<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>犬タローの虫さんまってまって</title>
    <meta
      name="description"
      content="犬タローを操作して、制限時間内に虫さんを集めるブラウザゲームです。お邪魔に当たるとゲームオーバー。"
    />
    <link rel="stylesheet" href="style.css?v=20260616-sp-control2" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="960" height="540" aria-label="犬タローの虫さんまってまって"></canvas>
      <div class="hud" aria-hidden="true">
        <div class="stat">
          <span>ITEMS</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>TIME</span>
          <strong id="time">40</strong>
        </div>
      </div>
      <button id="start" class="start-button" type="button">START</button>
      <button id="continue" class="continue-button" type="button" hidden>RESULT</button>
      <div id="mobile-controls" class="mobile-controls">
        <div id="stick-zone" class="stick-zone" role="application" aria-label="左右移動スティック">
          <div class="stick-base">
            <span id="stick-thumb" class="stick-thumb"></span>
          </div>
        </div>
        <button id="jump-button" class="jump-button" type="button" aria-label="ジャンプ">↑</button>
      </div>
      <section id="result-panel" class="result-panel" aria-live="polite" hidden>
        <span class="result-label">RESULT</span>
        <strong id="result-title" class="result-title">CLEAR</strong>
        <div class="result-summary">
          <div id="result-time-row" class="result-row">
            <span>TIME</span>
            <strong id="result-time">0.0s</strong>
          </div>
          <div class="result-row result-total">
            <span>TOTAL</span>
            <strong><span id="result-total">0</span><small class="count-unit">ひき</small></strong>
          </div>
        </div>
        <div class="result-breakdown">
          <div>
            <img src="assets/item_a.png" alt="" />
            <strong><span id="result-a">0</span><small class="count-unit">ひき</small></strong>
          </div>
          <div>
            <img src="assets/item_b.png" alt="" />
            <strong><span id="result-b">0</span><small class="count-unit">ひき</small></strong>
          </div>
          <div>
            <img src="assets/item_c.png" alt="" />
            <strong><span id="result-c">0</span><small class="count-unit">ひき</small></strong>
          </div>
        </div>
        <div class="result-actions">
          <button id="save-screen" type="button">画面保存</button>
          <button id="save-result" type="button">リザルト保存</button>
          <button id="share-open" type="button">共有</button>
          <button id="profile-open" type="button">フォロー</button>
        </div>
        <div id="share-panel" class="share-panel" hidden>
          <button id="share-native" type="button">画像つき共有</button>
          <button id="copy-url" type="button">URLコピー</button>
          <span id="share-status" aria-live="polite"></span>
        </div>
        <div id="profile-panel" class="profile-panel" hidden>
          <div>
            <a href="https://x.com/erikanuinui" target="_blank" rel="noopener">X</a>
            <a href="https://youtube.com/channel/UCdnf6zMzSdZuvUxS-CS2REQ?si=6SSUX-yhsGjFffu9" target="_blank" rel="noopener">YouTube</a>
          </div>
          <button id="profile-close" type="button">CLOSE</button>
        </div>
        <div class="result-close-actions">
          <button id="restart" class="restart-button" type="button">RESTART</button>
          <button id="end" class="end-button" type="button">おわり</button>
        </div>
      </section>
    </main>
    <script src="game.js?v=20260615-hazard-tune"></script>
  </body>
</html>
